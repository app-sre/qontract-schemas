---
"$schema": /metaschema-1.json
version: "1.0"
type: object
title: "Quay Robot Account"
description: |
  Schema for defining Quay robot account in app-interface.
  This includes details about the robot account's usernames
  and associated roles.

additionalProperties: false
properties:
  "$schema":
    type: string
    enum:
    - /access/quay-robot-1.yml
  labels:
    "$ref": "/common-1.json#/definitions/labels"
  name:
    type: string
    description: |
      The name of the robot account.
  description:
    type: string
    description: |
      A brief description of the robot account.
  quay_username:
    "$ref": "/common-1.json#/definitions/identifier"
    description: |
      The Quay robot account name.
      In Quay will be shown as org_name+quay_username.
  owner:
    "$ref": "/common-1.json#/definitions/crossref"
    "$schemaRef": "/access/user-1.yml"
    description: |
      Reference to the owner of the robot account.
  roles:
    type: array
    description: |
      A list of roles assigned to the robot account.
    items:
      "$ref": "/common-1.json#/definitions/crossref"
      "$schemaRef": "/access/role-1.yml"

required:
- $schema
- labels
- name
